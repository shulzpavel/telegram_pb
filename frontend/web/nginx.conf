server {
  listen 80;
  absolute_redirect off;
  root /usr/share/nginx/html;
  index index.html;

  # ---------------------------------------------------------------------------
  # Security headers
  # ---------------------------------------------------------------------------
  # Applied to every response from this server block. `always` forces nginx
  # to emit them on error pages too, so a 404 still ships the CSP.
  #
  # CSP notes:
  #  - `script-src 'self'` is enough because Vite produces hashed bundles
  #    that load via <script type=module src=...> with no inline JS.
  #  - `style-src 'self' 'unsafe-inline'` is required because Tailwind
  #    injects a handful of inline styles for keyframes; without it the
  #    runtime breaks.
  #  - `connect-src 'self'` covers both the REST API (`/api/...`) and the
  #    WebSocket (`/api/v1/ws/...`) because both are proxied by this same
  #    nginx — the browser sees them as same-origin.
  #  - `frame-ancestors 'none'` is a stricter modern replacement for
  #    `X-Frame-Options: DENY` (CSP wins where both are set).
  #  - `img-src 'self' data:` lets the brand SVG + any inline data-URIs
  #    render (e.g. fallback avatars).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # X-Frame-Options is legacy but still respected by older browsers /
  # security scanners. CSP's `frame-ancestors` overrides it on modern UAs.
  add_header X-Frame-Options "DENY" always;

  # SPA routing — the React Router handles all unknown paths (including the
  # public landing at `/` and the 404 mascot for anything else).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    # Repeat the security headers because `add_header` doesn't inherit
    # across location blocks once one of them is declared inside.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Frame-Options "DENY" always;
  }

  location / {
    try_files $uri /index.html;
  }

  # Hashed Vite assets are immutable — let the browser cache them aggressively.
  # `index.html` itself is *not* in /assets so it remains revalidated each
  # navigation, which is what we want (deploys roll out instantly).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    # Repeat the security headers because `add_header` doesn't inherit
    # across location blocks once one of them is declared inside.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # Proxy WebSocket connections to voting-service
  location /api/v1/ws/ {
    proxy_pass http://voting-service:8002;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Proxy REST API to voting-service
  location /api/ {
    proxy_pass http://voting-service:8002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
}
