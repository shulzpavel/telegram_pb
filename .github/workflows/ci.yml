name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend tests
        run: PYTHONPATH=backend python -m pytest -q -p no:cacheprovider
      - name: Compile backend
        run: PYTHONPATH=backend python -m compileall -q backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm run test
      - name: Build frontend
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run frontend smoke tests
        run: npm run test:e2e

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose files
        run: |
          docker compose config >/tmp/telegram-pb-compose.yml
          docker compose -f docker-compose.prod.yml --env-file infra/deploy/prod.env.example config >/tmp/telegram-pb-prod-compose.yml
