name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  notify-start:
    name: Notify deploy pipeline started
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram start alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DOMAIN: planning.shults-sync.com
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets are not configured; skipping alert."
            exit 0
          fi

          TEXT="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s' \
            '🚀 <b>Деплой pipeline запущен</b>' \
            '<b>Проект:</b> Planning Poker' \
            '<b>Окружение:</b> <code>production</code>' \
            "<b>Домен:</b> <a href=\"https://${DOMAIN}\">${DOMAIN}</a>" \
            "<b>Ветка:</b> <code>${GITHUB_REF_NAME}</code>" \
            "<b>Коммит:</b> <code>${GITHUB_SHA::7}</code>" \
            "<b>Автор:</b> ${GITHUB_ACTOR}" \
            "<a href=\"${RUN_URL}\">Открыть GitHub Actions</a>"
          )"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" \
            >/dev/null || true

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend tests
        run: PYTHONPATH=backend python -m pytest -q -p no:cacheprovider
      - name: Compile backend
        run: PYTHONPATH=backend python -m compileall -q backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm run test
      - name: Build frontend
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run frontend smoke tests
        run: npm run test:e2e

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose files
        run: |
          docker compose config >/tmp/planning-poker-compose.yml
          docker compose -f docker-compose.prod.yml --env-file infra/deploy/prod.env.example config >/tmp/planning-poker-prod-compose.yml

  deploy-web:
    name: Deploy backend and web to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
      - compose
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/planning-poker
            git pull --ff-only origin main
            ./infra/deploy/deploy-prod.sh

  notify-result:
    name: Notify deploy pipeline result
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
      - compose
      - deploy-web
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram result alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DOMAIN: planning.shults-sync.com
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          COMPOSE_RESULT: ${{ needs.compose.result }}
          DEPLOY_RESULT: ${{ needs.deploy-web.result }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets are not configured; skipping alert."
            exit 0
          fi

          if [ "$BACKEND_RESULT" = "success" ] \
            && [ "$FRONTEND_RESULT" = "success" ] \
            && [ "$COMPOSE_RESULT" = "success" ] \
            && [ "$DEPLOY_RESULT" = "success" ]; then
            ICON="✅"
            TITLE="Деплой pipeline завершён"
            DETAILS="CI пройден, deploy job завершился успешно. Финальное подтверждение с сервера приходит отдельным сообщением от deploy-скрипта."
          else
            ICON="❌"
            TITLE="Деплой pipeline упал"
            DETAILS="Деплой до сервера мог не дойти. Проверь GitHub Actions run."
          fi

          TEXT="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s\n%s\n%s\n%s\n\n%s\n\n%s' \
            "${ICON} <b>${TITLE}</b>" \
            '<b>Проект:</b> Planning Poker' \
            '<b>Окружение:</b> <code>production</code>' \
            "<b>Домен:</b> <a href=\"https://${DOMAIN}\">${DOMAIN}</a>" \
            "<b>Ветка:</b> <code>${GITHUB_REF_NAME}</code>" \
            "<b>Коммит:</b> <code>${GITHUB_SHA::7}</code>" \
            "<b>backend:</b> <code>${BACKEND_RESULT}</code>" \
            "<b>frontend:</b> <code>${FRONTEND_RESULT}</code>" \
            "<b>compose:</b> <code>${COMPOSE_RESULT}</code>" \
            "<b>deploy-web:</b> <code>${DEPLOY_RESULT}</code>" \
            "${DETAILS}" \
            "<a href=\"${RUN_URL}\">Открыть GitHub Actions</a>"
          )"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" \
            >/dev/null || true
