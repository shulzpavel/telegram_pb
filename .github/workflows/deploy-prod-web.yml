name: Deploy Prod Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/planning-poker
            # Bootstrap on servers that don't yet have the deploy script:
            # pull first, then run the script from the fresh checkout.
            git pull --ff-only origin main
            ./infra/deploy/deploy-web-prod.sh
